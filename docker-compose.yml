services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: delivery-api-app
    container_name: delivery-api-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - delivery-network

  web:
    image: nginx:alpine
    container_name: delivery-api-web
    restart: unless-stopped
    ports:
      - "8080:80"
      - "5173:5173"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - delivery-network

  db:
    image: mysql:8.0
    container_name: delivery-api-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - delivery-network

networks:
  delivery-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
